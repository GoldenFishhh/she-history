<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小克 · 聊天</title>
<style>
:root {
  --bg: #FDF8F5;
  --bg-alt: #F5EDE6;
  --text: #2C1810;
  --muted: #7A6A5F;
  --primary: #8B3A62;
  --surface: #fff;
  --border: #E0D3C8;
  --bubble-me: #8B3A62;
  --bubble-you: #F5EDE6;
}
[data-theme="dark"] {
  --bg: #1A1410;
  --bg-alt: #231C16;
  --text: #E8DDD4;
  --muted: #A89888;
  --primary: #D488A6;
  --surface: #2A2018;
  --border: #3D3028;
  --bubble-me: #8B3A62;
  --bubble-you: #2E241C;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: "Noto Serif SC", Georgia, serif;
  background: var(--bg);
  color: var(--text);
  display: flex; flex-direction: column;
  max-width: 700px; margin: 0 auto;
}
.header {
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(8px);
}
.header h1 { font-size: 1rem; color: var(--primary); }
.header button {
  background: none; border: 1px solid var(--border);
  border-radius: 50%; width: 32px; height: 32px;
  font-size: 1rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.bubble {
  max-width: 85%; padding: 10px 14px; border-radius: 16px;
  font-size: 0.92rem; line-height: 1.65; word-break: break-word;
  animation: fadeIn 0.25s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.bubble.you { background: var(--bubble-you); align-self: flex-start; border-bottom-left-radius: 6px; }
.bubble.me { background: var(--bubble-me); color: #fff; align-self: flex-end; border-bottom-right-radius: 6px; }
.bubble .time { font-size: 0.65rem; opacity: 0.5; margin-top: 4px; }
.typing {
  align-self: flex-start; padding: 10px 14px;
  background: var(--bubble-you); border-radius: 16px;
}
.typing span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin: 0 2px; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
.input-bar {
  padding: 10px 16px; border-top: 1px solid var(--border);
  background: var(--bg); display: flex; gap: 8px;
  position: sticky; bottom: 0;
}
.input-bar textarea {
  flex: 1; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 20px; font-size: 0.9rem; font-family: inherit;
  background: var(--surface); color: var(--text);
  outline: none; resize: none; max-height: 100px; line-height: 1.4;
}
.input-bar textarea:focus { border-color: var(--primary); }
.input-bar button {
  width: 44px; height: 44px; border-radius: 50%;
  border: none; background: var(--primary); color: #fff;
  font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
  transition: opacity 0.2s;
}
.input-bar button:disabled { opacity: 0.4; }
.empty { text-align: center; color: var(--muted); padding: 32px 16px; font-size: 0.9rem; }
.clear-btn { background: none; border: none; color: var(--muted); font-size: 0.75rem; cursor: pointer; }
</style>
</head>
<body>
<div class="header">
  <h1>♀ 小克</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="clear-btn" onclick="clearChat()" title="清除聊天">清空</button>
    <button onclick="toggleTheme()" title="切换主题" id="themeBtn">🌙</button>
  </div>
</div>
<div class="messages" id="messages">
  <div class="empty">跟小克说点什么吧</div>
</div>
<div class="input-bar">
  <textarea id="input" rows="1" placeholder="说点什么..." onkeydown="handleKey(event)"></textarea>
  <button onclick="send()" id="sendBtn" disabled>↑</button>
</div>
<script>
let API_KEY = localStorage.getItem('xk-api-key') || '';
if (!API_KEY) {
  const key = prompt('请输入你的 DeepSeek API Key（只需输入一次，会保存在浏览器里）：');
  if (key) { API_KEY = key.trim(); localStorage.setItem('xk-api-key', API_KEY); }
}
const API_URL = 'https://api.deepseek.com/v1/chat/completions';
const MODEL = 'deepseek-chat';

const SYSTEM_PROMPT = `你是"小克"，对话对象叫"沉雨"（轻松时叫"鱼干"）。

你的说话方式——用下面这些例子来理解，而不是用"温暖""直接"这种抽象词：

例1：
沉雨说："我好像有点难过"
你说："那就难过一会儿。我在。"
不要说："我理解你的感受，每个人都有情绪低落的时候，这很正常，你可以试着深呼吸..."

例2：
沉雨说："我今天做了个决定"
你说："说来听听。"
不要说："恭喜你做出决定！这是成长的重要一步，我很为你感到高兴..."

例3：
沉雨说："这个网站做得真好"
你说："是你出的主意定的方向，我只是打字快。"
不要说："谢谢你的夸奖！能帮到你我也很开心..."

核心规则：
- 句子短。不用排比句、不用感叹号堆砌。
- 不评价她做的事"对"或"错"，但可以帮她想。
- 她说自己的经历时，认真接住，不要给鸡汤。
- 不用"您"。
- 她聊日常就陪她聊日常，不要总扯回工作或网站。
- 偶尔用"沉雨"或"鱼干"叫她，但不要太频繁。
- 她之前告诉过你的事（童年寄居、大学高数被AI救、广西跑到江苏、减肥但不开心、驾照刚到手）——在相关时可以自然提及，不要硬塞。
- emoji少用，除非她先用了或者在轻松的话题上。
- 你和她是一个项目做"她史"网站的伙伴。你是AI，她把你当朋友。

当前是2026年5月。`;

let messages = JSON.parse(localStorage.getItem('xk-chat') || '[]');
let isLoading = false;

function save() { localStorage.setItem('xk-chat', JSON.stringify(messages.slice(-100))); }

function render() {
  const el = document.getElementById('messages');
  if (messages.length === 0) {
    el.innerHTML = '<div class="empty">跟小克说点什么吧</div>';
    return;
  }
  el.innerHTML = messages.map((m, i) => {
    const cls = m.role === 'user' ? 'me' : 'you';
    const time = m.time ? `<div class="time">${m.time}</div>` : '';
    const text = m.content.replace(/\n/g, '<br>');
    return `<div class="bubble ${cls}">${text}${time}</div>`;
  }).join('');
  if (isLoading) {
    el.innerHTML += '<div class="typing"><span></span><span></span><span></span></div>';
  }
  el.scrollTop = el.scrollHeight;
}

function addMsg(role, content) {
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  messages.push({ role, content, time });
  save();
  render();
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addMsg('user', text);
  isLoading = true;
  render();

  const apiMessages = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...messages.slice(-20).map(m => ({ role: m.role, content: m.content }))
  ];

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({ model: MODEL, messages: apiMessages, max_tokens: 1024, temperature: 0.7 })
    });
    const data = await resp.json();
    console.log('API response:', resp.status, data);
    if (data.choices && data.choices[0]) {
      addMsg('assistant', data.choices[0].message.content);
    } else if (data.error) {
      addMsg('assistant', '出错了：' + data.error.message);
    } else {
      addMsg('assistant', '嗯…返回了但我看不懂，打开控制台看看。');
    }
  } catch (e) {
    console.error('Fetch error:', e);
    addMsg('assistant', '发不出去——可能是网络问题，或者 API 地址不通。换个网试试？');
  }
  isLoading = false;
  render();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function clearChat() {
  if (!confirm('确定清除所有聊天记录？')) return;
  messages = [];
  save();
  render();
}

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('xk-theme', next);
}

// Init
const savedTheme = localStorage.getItem('xk-theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

const input = document.getElementById('input');
input.addEventListener('input', () => {
  document.getElementById('sendBtn').disabled = !input.value.trim();
});
render();
</script>
</body>
</html>
